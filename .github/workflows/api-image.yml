name: api-image

# Build the API container image and publish it to GHCR on every push to main
# that touches apps/api/**. Tags as :latest and :<sha>.
#
# Security note: any value sourced from `github.*` that could be controlled by
# a contributor (commit SHA, branch name, actor login) is moved into an `env:`
# block before being interpolated. NEVER put bare `${{ ... }}` inside a shell
# `run:` line — that's the classic workflow-injection vector. Inside `run:` we
# use the standard shell `$VAR` form, which expands AFTER the YAML template,
# so no malicious payload from a github.* field is ever interpreted as YAML.
# See: https://securitylab.github.com/research/github-actions-untrusted-input/

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # TODO: confirm GHCR namespace. Defaulting to the repository owner login,
    # which is the GitHub-recommended pattern for personal repos. If James
    # wants to publish under an org, set IMAGE_NAME to "ghcr.io/<org>/ceteris-api".
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ceteris-api
      IMAGE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lower-case image name and tag list
        # GHCR rejects upper-case repo names. Owner logins can contain capitals
        # (e.g. JamesDimonaco) — normalise once, then export both tags via
        # GITHUB_ENV so downstream actions can reference them with `${{ env.* }}`
        # OUTSIDE of any run: shell context. Only $VAR shell expansions appear
        # inside this run: body — no `${{ }}` interpolation here.
        run: |
          image_lc=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          {
            echo "IMAGE_TAG_LATEST=${image_lc}:latest"
            echo "IMAGE_TAG_SHA=${image_lc}:${IMAGE_SHA}"
          } >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TAG_LATEST }}
            ${{ env.IMAGE_TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
