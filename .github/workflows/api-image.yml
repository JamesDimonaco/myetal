name: api-image

# Build the API container image and publish it to Docker Hub on every push to
# main that touches apps/api/**. Tags as :latest, :<sha>, and :<version> (from
# pyproject.toml).
#
# Security note: any value sourced from `github.*` that could be controlled by
# a contributor (commit SHA, branch name, actor login) is moved into an `env:`
# block before being interpolated. NEVER put bare `${{ ... }}` inside a shell
# `run:` line — that's the classic workflow-injection vector.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: jamesdimonaco/myetal-api
      IMAGE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          version=$(grep -oP '(?<=^version = ")[^"]+' apps/api/pyproject.toml)
          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
