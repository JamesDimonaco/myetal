name: api-image

# Build the API container image and publish it to Docker Hub on every push to
# main that touches apps/api/**. Tags as :latest, :<sha>, and :<version> (from
# pyproject.toml).
#
# Security note: any value sourced from `github.*` that could be controlled by
# a contributor (commit SHA, branch name, actor login) is moved into an `env:`
# block before being interpolated. NEVER put bare `${{ ... }}` inside a shell
# `run:` line — that's the classic workflow-injection vector.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Re-run lint+tests inline so the build step has a hard dependency on a
  # green test suite. Mirrors api-tests.yml — keep them in sync.  Without
  # this, a broken main push would publish the bad image and Railway would
  # deploy it before api-tests finished running in parallel.
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_NAME: jamesdimonaco/myetal-api
      IMAGE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          version=$(grep -oP '(?<=^version = ")[^"]+' apps/api/pyproject.toml)
          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
