name: api-tests

# Lint + test the FastAPI backend on every PR that touches it.
# We intentionally do NOT also run on push to main — api-image.yml has an
# inline `test` job that runs the same checks before publishing the image,
# so duplicating them here would just double the CI minutes per push.

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pin to the same uv major as the Dockerfile so behaviour matches.
          version: "0.5.4"

      - name: Set up Python
        # uv reads .python-version automatically, but installing it explicitly
        # gives clearer logs when the cache is cold.
        run: uv python install

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest
