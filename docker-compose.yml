services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: myetal
      POSTGRES_PASSWORD: myetal
      POSTGRES_DB: myetal
    ports:
      - "5432:5432"
    volumes:
      - myetal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myetal"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    # Load OAuth secrets from .env (gitignored). Compose 2.24+ "long form"
    # so the file is optional — CI doesn't need it; dev does.
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      ENV: dev
      SECRET_KEY: dev-secret-change-me-PLEASE-do-not-use-in-prod-XXXXXXXX
      DATABASE_URL: postgresql+asyncpg://myetal:myetal@db:5432/myetal
      # PUBLIC_API_URL and PUBLIC_BASE_URL come from apps/api/.env so each
      # developer can point at their own LAN IP / ngrok / staging without
      # editing this file. Falls back to the application defaults
      # (http://localhost:8000 / 3000) if .env doesn't set them.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live source reload — change a .py and uvicorn auto-reloads
      - ./apps/api/src:/app/src
      # Mount alembic so the auto-migrate step on startup sees the latest revisions
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
    # Apply any pending DB migrations, then start uvicorn with reload
    command: >
      sh -c "alembic upgrade head && uvicorn myetal_api.main:app --host 0.0.0.0 --port 8000 --reload"
    # /healthz never touches the DB, so this only reflects "is the process up".
    # /readyz is the DB-aware probe; it's not used here because compose has
    # no native concept of routing decisions, only restart triggers.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  myetal_pgdata:
