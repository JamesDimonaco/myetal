<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: rounded square in the brand teal -->
  <rect width="32" height="32" rx="6" fill="#0E4145"/>

  <!-- Simplified QR finder pattern (top-left) -->
  <rect x="5" y="5" width="9" height="9" rx="1.5" fill="#fff"/>
  <rect x="7" y="7" width="5" height="5" rx="0.5" fill="#0E4145"/>
  <rect x="8.5" y="8.5" width="2" height="2" fill="#fff"/>

  <!-- Simplified QR finder pattern (top-right) -->
  <rect x="18" y="5" width="9" height="9" rx="1.5" fill="#fff"/>
  <rect x="20" y="7" width="5" height="5" rx="0.5" fill="#0E4145"/>
  <rect x="21.5" y="8.5" width="2" height="2" fill="#fff"/>

  <!-- Simplified QR finder pattern (bottom-left) -->
  <rect x="5" y="18" width="9" height="9" rx="1.5" fill="#fff"/>
  <rect x="7" y="20" width="5" height="5" rx="0.5" fill="#0E4145"/>
  <rect x="8.5" y="21.5" width="2" height="2" fill="#fff"/>

  <!-- Accent data dots (bottom-right area) -->
  <rect x="18" y="18" width="3" height="3" rx="0.5" fill="#5BAEB3"/>
  <rect x="22" y="18" width="3" height="3" rx="0.5" fill="#fff" opacity="0.7"/>
  <rect x="18" y="22" width="3" height="3" rx="0.5" fill="#fff" opacity="0.7"/>
  <rect x="22" y="22" width="3" height="3" rx="0.5" fill="#5BAEB3"/>
  <rect x="26" y="18" width="1.5" height="1.5" fill="#fff" opacity="0.4"/>
  <rect x="26" y="22" width="1.5" height="1.5" fill="#fff" opacity="0.4"/>

  <!-- Connecting dots (data area) -->
  <rect x="15" y="5" width="2" height="2" fill="#5BAEB3"/>
  <rect x="5" y="15" width="2" height="2" fill="#5BAEB3"/>
  <rect x="15" y="15" width="2" height="2" fill="#fff" opacity="0.5"/>
</svg>
