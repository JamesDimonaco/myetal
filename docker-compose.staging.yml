# ============================================================
# docker-compose.staging.yml — Pi-hosted staging stack
# ============================================================
# Separate from docker-compose.yml so staging can run alongside dev/prod
# on the same Pi without colliding. Use a distinct project name when
# bringing it up:
#
#   docker compose -p myetal-staging -f docker-compose.staging.yml --env-file .env.staging up -d
#
# Reverse-proxy on the Pi (Caddy / Nginx) routes:
#   staging-api.myetal.app → 127.0.0.1:8001  (this stack)
#   api.myetal.app         → 127.0.0.1:8000  (the existing prod stack)
#
# DB is co-resident on the same Pi but a SEPARATE Postgres container so
# staging migrations / truncates can never touch prod data.
#
# Both services load env vars from `.env.staging` via the env_file directive
# rather than ${VAR} interpolation, so we don't depend on the compose CLI's
# `--env-file` flag picking up the file (which has been flaky in practice).

# Pinned project name — even without `-p`, this stack can't collide with
# the prod compose project (which defaults to `myetal`).
name: myetal-staging

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.staging
    # Bind to all interfaces. Staging Postgres is reachable externally on
    # Pi:5433 so Vercel's BA route handlers can read/write the session +
    # account tables. Router forwards external :55432 to Pi:5433.
    # Strong password (~96 bits entropy) + non-standard external port
    # mitigate the public exposure for staging; revisit if abuse appears.
    ports:
      - "5433:5432"
    volumes:
      - myetal_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      # The `$$` escapes a single `$` for compose so the variable is
      # expanded INSIDE the container at exec time, not by compose.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: jamesdimonaco/myetal-api:staging
    pull_policy: always   # `docker compose pull` always grabs the latest :staging tag
    env_file:
      - .env.staging
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy
    # Apply pending migrations, then start uvicorn (no --reload — this is
    # a real deploy, not dev mode).
    command: >
      sh -c "alembic upgrade head && uvicorn myetal_api.main:app --host 0.0.0.0 --port 8000 --log-level info"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      # First-run on Pi includes alembic migration + uvicorn boot — give it
      # time. Subsequent runs are faster, but start_period covers worst case.
      start_period: 60s
    restart: unless-stopped

volumes:
  myetal_staging_pgdata:
